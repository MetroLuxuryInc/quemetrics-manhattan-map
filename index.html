<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Manhattan Traffic Map</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #ffffff;
    }
    #map {
      width: 100%;
      height: 100%;
    }
  </style>

  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY"></script>

  <script>
    function initMap() {
      const manhattan = { lat: 40.7831, lng: -73.9712 };

      const map = new google.maps.Map(document.getElementById("map"), {
        zoom: 12,
        center: manhattan,
        mapTypeId: "roadmap",
        disableDefaultUI: true
      });

      const trafficLayer = new google.maps.TrafficLayer();
      trafficLayer.setMap(map);
    }
  </script>
</head>

<body onload="initMap()">
  <div id="map"></div>
</body>
</html>
