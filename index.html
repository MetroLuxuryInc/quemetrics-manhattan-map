<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manhattan Traffic Map</title>
  <style>
    html, body {
      height: 100vh;
      width: 100vw;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    #trafficMap {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      border: 0;
    }
  </style>
</head>
<body>

  <!-- 511NY Embedded Map (Manhattan Center) -->
  <iframe
    id="trafficMap"
    src="https://511ny.org/Map/EmbeddedMap?region=NYC&layers=trafficSpeeds,incidents&center=40.7831,-73.9712&zoom=13"
    allowfullscreen
    loading="lazy">
  </iframe>

</body>
</html>
